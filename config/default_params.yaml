# Gel-Percolation Simulation Default Parameters
# Percolation Inversion Dynamics in Enzymatically Degrading Wound Hydrogels

hydrogel:
  box_size: 50.0             # um, simulation box side length
  rho_x: 1.0                 # um^-3, crosslink junction density (synthesis-controlled)
  r_c: 1.0                   # um, chain cutoff radius — z≈4 per node, p_c≈0.33 for RGG (was 5.0 → z≈524, p_c≈0.0026, unphysical)
  k_base: 0.002              # s^-1 nM^-1, base MMP cleavage rate — transition at ~step 500 giving ≥450 pre-transition EWS steps (was 0.01 → transition at step 134, too early)
  tau_ionic: 3600.0          # s, ionic bond reference lifetime at body temperature
  E_activation: 50000.0      # J/mol, Arrhenius activation energy for ionic bond rupture
  bond_type: alginate         # 'alginate' (ionic + covalent) or 'peg' (purely covalent)
  p_c_nominal: 0.33          # dimensionless, empirical RGG threshold for z≈4 (Bethe: 1/(z-1)≈0.33); 0.2593 is the cubic lattice value

mechanics:
  f_elastic: 2.1             # elastic/conductivity exponent (bond-bending: 2.1; central-force: 3.75)
  Delta: 0.72                # dynamic/frequency exponent at the gel point
  nu: 0.88                   # correlation-length exponent (3D percolation universality class)
  gamma_sus: 1.8             # susceptibility exponent (divergence of cluster size)
  kB: 1.380649e-23           # J/K, Boltzmann constant
  T: 310.15                  # K, physiological temperature (37 degC)
  E_ref: 1000.0              # Pa, reference stiffness (G' at p = 1, fully crosslinked)
  p_crossover: 0.05          # dimensionless half-width of critical-to-affine crossover region
  network_type: alginate      # 'alginate' (bond-bending) or 'peg' (central-force)

mmp_diffusion:
  D_mmp: 1.0                 # um^2/s, MMP-1/MMP-2 effective diffusion coefficient in gel
  k_degradation_mmp: 0.001   # s^-1, first-order MMP inactivation / binding rate
  grid_resolution: 20        # number of grid points per spatial dimension (NxNxN)

pdgf:
  D_pdgf: 10.0               # um^2/s, PDGF-BB diffusion coefficient (faster than MMP)
  source_strength: 1.0       # nM, PDGF concentration maintained at wound centre
  source_radius: 5.0         # um, radius of the PDGF point-source region

cells:
  mu_durotaxis: 0.5          # um s^-1 (Pa um^-1)^-1, durotaxis speed coefficient
  mu_chemotaxis: 0.3         # um s^-1 (nM um^-1)^-1, PDGF chemotaxis speed coefficient
  D_rand: 0.1                # um^2/s, random-motility effective diffusion coefficient
  E_threshold: 500.0         # Pa, stiffness threshold for high/low MMP secretion switch
  k_MMP_high: 1.0e-3         # nM s^-1 cell^-1, MMP secretion rate on stiff substrate
  k_MMP_low: 1.0e-5          # nM s^-1 cell^-1, MMP secretion rate on soft substrate
  r_col: 0.01                # um s^-1 per (Pa/E_ref), collagen/matrix deposition rate
  E_ref: 1000.0              # Pa, reference stiffness used in collagen deposition scaling

simulation:
  dt: 1.0                    # s, integration timestep
  n_steps: 1800              # total steps (30 min at dt=1 s; use 3600 for 1 h)
  record_interval: 10        # save system state every N steps
  n_cells: 20                # number of fibroblasts seeded at t=0
  random_seed: 42            # RNG seed for reproducibility
  output_dir: results/       # directory for HDF5 / JSON output files

ews:
  window_size: 50            # rolling-window length for AR(1) and variance estimators
  lag: 1                     # autocorrelation lag (steps) for the AR(1) estimator
  lifetime_threshold_tda: 0.5  # min H1 loop persistence lifetime counted as long-lived
  sigma_threshold_ews: 2.0    # EWS onset flag: signal > baseline_mean + N * baseline_std

parameter_sweep:
  n_jobs: 1                                             # parallel workers (requires joblib)
  rho_x_range: [0.3, 0.5, 0.7, 1.0, 1.5, 2.0]        # crosslink densities to sweep (um^-3)
  k_base_range: [0.001, 0.005, 0.01, 0.05, 0.1]       # base MMP rates to sweep (s^-1 nM^-1)
  n_cells_range: [5, 10, 20, 40]                        # fibroblast counts to sweep
